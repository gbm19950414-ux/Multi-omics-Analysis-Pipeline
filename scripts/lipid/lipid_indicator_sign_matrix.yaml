# ============================================================
# Directionality Sign Matrix
# 用于机制瓶颈分数计算的方向性校准
# Bottleneck_sign：+1 = 高值代表瓶颈重；-1 = 高值代表瓶颈轻（需取反）
# ============================================================

Synthesis:
  CL_PG_ratio:
    raw_increase_means: "PG → CL 转化增强"
    effect_on_CL: "瓶颈减轻"
    bottleneck_sign: -1
    note: "CL/PG 越高越好，为了让高值代表瓶颈重，需要乘 -1"

  sum_CL:
    raw_increase_means: "CL 供应上升"
    effect_on_CL: "瓶颈减轻"
    bottleneck_sign: -1
    note: "CL 多 = 状态好，需反转"

  sum_PG:
    raw_increase_means: "PG 前体积累"
    effect_on_CL: "合成瓶颈加重"
    bottleneck_sign: +1
    note: "PG 上升常提示合成不畅"

  CL_species_pattern_deviation:
    raw_increase_means: "CL 组成越偏离正常"
    effect_on_CL: "合成/重塑异常加重"
    bottleneck_sign: +1
    note: "偏离越大 = 异常越重"

Remodeling:
  MLCL_CL_ratio:
    raw_increase_means: "MLCL 堆积，重塑下降"
    effect_on_CL: "瓶颈加重"
    bottleneck_sign: +1
    note: "典型反向指标（高 = 差）"

  sum_MLCL:
    raw_increase_means: "MLCL 积累"
    effect_on_CL: "瓶颈加重"
    bottleneck_sign: +1

  FA_remodeling_distance:
    raw_increase_means: "CL 的脂酰组成越偏离正常 18:2 型"
    effect_on_CL: "重塑功能下降"
    bottleneck_sign: +1

Oxidation:
  oxCL_CL_ratio:
    raw_increase_means: "氧化压力增强"
    effect_on_CL: "CL 损伤加重"
    bottleneck_sign: +1

  sum_oxCL:
    raw_increase_means: "氧化 CL 增加"
    effect_on_CL: "氧化损伤加剧"
    bottleneck_sign: +1

  CL_oxidation_depth:
    raw_increase_means: "深度氧化增加"
    effect_on_CL: "膜损伤更严重"
    bottleneck_sign: +1

Transport:
  IMM_OMM_CL_asymmetry:
    raw_increase_means: "CL 内外膜分布偏差变大"
    effect_on_CL: "转运/分布障碍"
    bottleneck_sign: +1

  PG_IMM_OMM_asymmetry:
    raw_increase_means: "PG 内外膜分布失衡增加"
    effect_on_CL: "转运异常"
    bottleneck_sign: +1

  PG_PA_ratio:
    raw_increase_means: "PA → PG 转换更充分"
    effect_on_CL: "供应改善（瓶颈减轻）"
    bottleneck_sign: -1
    note: "高 PG/PA = 好，需要取反以对齐“高 = 瓶颈重”的规则"

Supply:
  sum_CL:
    raw_increase_means: "CL 供应增加"
    effect_on_CL: "瓶颈减轻"
    bottleneck_sign: -1

  sum_PG:
    raw_increase_means: "PG 前体积累"
    effect_on_CL: "合成受限"
    bottleneck_sign: +1

  PG_PA_ratio:
    raw_increase_means: "前体流更顺畅"
    effect_on_CL: "供应改善"
    bottleneck_sign: -1

  mito_lipid_mass:
    raw_increase_means: "线粒体膜容量增加"
    effect_on_CL: "供应提升"
    bottleneck_sign: -1

  CL_fraction:
    raw_increase_means: "CL 占比上升"
    effect_on_CL: "内膜结构更完整"
    bottleneck_sign: -1
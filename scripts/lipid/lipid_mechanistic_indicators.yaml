mechanistic_axes:

  Synthesis:
    indicators:
      - name: CL_PG_ratio
        formula: "sum(CL) / sum(PG)"
        description: "CL 与 PG 之比，表示 PG → CL 转化效率（合成能力）"
        bottleneck_sign: -1
        weight: 1.0

      - name: MLCL_CL_ratio
        formula: "sum(MLCL) / sum(CL)"
        description: "MLCL/CL 比，Remodeling 核心指标，在合成轴中作为反向证据"
        bottleneck_sign: -1
        weight: 0.3

      - name: oxCL_CL_ratio
        formula: "sum(oxCL) / sum(CL)"
        description: "氧化 CL / 总 CL 比例，反映氧化压力，在合成轴中作为反向证据"
        bottleneck_sign: -1
        weight: 0.3

      - name: sum_CL
        formula: "sum(CL)"
        description: "CL 总量，也用于 Supply / Availability 轴"
        bottleneck_sign: -1
        weight: 0.5

      - name: sum_PG
        formula: "sum(PG)"
        description: "PG 前体总量，PG 上升可代表 CL 合成瓶颈（在 PA 不极端异常前提下）"
        bottleneck_sign: 1
        weight: 0.7


  Remodeling:
    indicators:
      - name: CL_PG_ratio
        formula: "sum(CL) / sum(PG)"
        description: "CL/PG 比，合成轴核心指标，在重塑轴中作为反向证据"
        bottleneck_sign: 1
        weight: 0.3

      - name: MLCL_CL_ratio
        formula: "sum(MLCL) / sum(CL)"
        description: "MLCL / CL 比，反向指标：高值 = 重塑效率差"
        bottleneck_sign: 1
        weight: 1.0

      - name: oxCL_CL_ratio
        formula: "sum(oxCL) / sum(CL)"
        description: "氧化 CL 比例，在重塑轴中作为反向证据"
        bottleneck_sign: -1
        weight: 0.3

      - name: sum_MLCL
        formula: "sum(MLCL)"
        description: "MLCL 累积（重塑不足的产物）"
        bottleneck_sign: 1
        weight: 0.5


  Oxidation:
    indicators:
      - name: CL_PG_ratio
        formula: "sum(CL) / sum(PG)"
        description: "CL/PG 比，合成轴指标，在氧化轴中作为反向证据"
        bottleneck_sign: 1
        weight: 0.3

      - name: MLCL_CL_ratio
        formula: "sum(MLCL) / sum(CL)"
        description: "MLCL/CL 比，Remodeling 核心指标，在氧化轴中作为反向证据"
        bottleneck_sign: -1
        weight: 0.3

      - name: oxCL_CL_ratio
        formula: "sum(oxCL) / sum(CL)"
        description: "氧化 CL / 总 CL 比例，反映 CL 氧化压力"
        bottleneck_sign: 1
        weight: 1.0

      - name: sum_oxCL
        formula: "sum(oxCL)"
        description: "氧化 CL 总量"
        bottleneck_sign: 1
        weight: 0.5


  Transport:
    indicators:
      - name: CL_PG_ratio
        formula: "sum(CL) / sum(PG)"
        description: "CL/PG 比，在 Transport 轴中作为反向证据"
        bottleneck_sign: 1
        weight: 0.3

      - name: PA_CL_mismatch
        formula: "z(PA) - z(CL)"
        description: "PA 与 CL 之间的丰度不匹配"
        bottleneck_sign: 1
        weight: 1.0

      - name: PA_PG_mismatch
        formula: "z(PA) - z(PG)"
        description: "PA 与 PG 之间的丰度不匹配（绝对差值），反映 PA → PG 通路/转运的不协调"
        bottleneck_sign: 1
        weight: 1.0

      - name: sum_PA
        formula: "sum(PA)"
        description: "PA 总量，在 Transport 轴中作为反向证据"
        bottleneck_sign: 1
        weight: 0.3


  Supply:
    indicators:
      - name: MLCL_CL_ratio
        formula: "sum(MLCL) / sum(CL)"
        description: "MLCL/CL 比，在 Supply 轴中作为反向证据"
        bottleneck_sign: -1
        weight: 0.3

      - name: PA_PG_mismatch
        formula: "z(PA) - z(PG)"
        description: "PA–PG mismatch，在 Supply 轴中作为反向证据"
        bottleneck_sign: -1
        weight: 0.3

      - name: PG_PA_ratio
        formula: "sum(PG) / sum(PA)"
        description: "PA → PG 的供给链效率"
        bottleneck_sign: -1
        weight: 0.5

      - name: oxCL_CL_ratio
        formula: "sum(oxCL) / sum(CL)"
        description: "氧化 CL 比例，在 Supply 轴中作为反向证据"
        bottleneck_sign: -1
        weight: 0.3

      - name: sum_PA
        formula: "sum(PA)"
        description: "PA 总量（供应能力）"
        bottleneck_sign: -1
        weight: 1.0

      - name: sum_PG
        formula: "sum(PG)"
        description: "PG 总前体量，在特定前提下可反映 supply 或 synthesis 变化"
        bottleneck_sign: 1
        weight: 0.3


  Membrane context:
    indicators:
      - name: CL_fraction
        formula: "sum(CL) / sum(PC + PE + CL)"
        description: "CL 占比（内膜 cristae 完整性/CL niche）"
        bottleneck_sign: -1
        weight: 1.0

      - name: mito_lipid_mass
        formula: "sum(PC + PE + CL)"
        description: "线粒体膜总容量（PC+PE+CL）"
        bottleneck_sign: -1
        weight: 1.0
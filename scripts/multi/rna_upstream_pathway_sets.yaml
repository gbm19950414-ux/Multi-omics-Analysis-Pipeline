pathways:

  ## =========================================================
  ## SUPPLY 轴：底物供给 / 能量感应 / 脂肪酸动员
  ## =========================================================

  Supply_AMPK_energy_sensing:
    axis: "Supply"
    label: "AMPK energy sensing & catabolic switch"
    description: >
      AMPK 复合体及其典型下游靶基因，激活脂肪酸氧化、线粒体底物供给
      和整体分解代谢程序。这里刻意聚焦于在巨噬细胞/脂肪组织中普遍表达的
      AMPK 核心亚基与 FAO 机器，避免依赖骨骼肌/肝脏特异性 readout。
    genes:
      # AMPK 复合体核心亚基（能量感应）
      - name: Prkaa1      # AMPK catalytic α1
        gene_effect_sign: 1
      - name: Prkaa2      # AMPK catalytic α2
        gene_effect_sign: 1
      - name: Prkab1      # AMPK regulatory β1
        gene_effect_sign: 1
      - name: Prkag2      # AMPK regulatory γ2
        gene_effect_sign: 1

      # 与 AMPK 协同的脂肪酸氧化机器（上线粒体底物供给）
      - name: Cpt1a       # Carnitine palmitoyltransferase 1A
        gene_effect_sign: 1
      - name: Acadl       # Long-chain acyl-CoA dehydrogenase
        gene_effect_sign: 1
      - name: Acadm       # Medium-chain acyl-CoA dehydrogenase
        gene_effect_sign: 1
      - name: Slc27a1     # Fatty acid transporter (FATP1)
        gene_effect_sign: 1

      # 更普适的糖代谢 readout（替代 GLUT4 / G6PC 这类组织特异性标记）
      - name: Hk2         # Hexokinase 2
        gene_effect_sign: 1

  Supply_mTOR_SREBP_lipogenesis:
    axis: "Supply"
    label: "mTOR–SREBP-driven anabolic lipid synthesis"
    description: >
      mTORC1 活性及其下游 SREBP1/2 靶基因，驱动 de novo 脂肪酸合成和
      磷脂前体（如 PA、PC、PE）的供给，偏向合成/同化代谢。以 mTOR 复合体
      自身及核心脂质生成酶为主，避免把 4E-BP1 这类翻译抑制因子当作转录 readout。
    genes:
      # mTORC1 复合体与经典 readout
      - name: Mtor        # mTOR kinase
        gene_effect_sign: 1
      - name: Rptor       # Raptor, mTORC1 scaffold
        gene_effect_sign: 1
      - name: Rps6kb1     # S6K1, mTORC1 下游
        gene_effect_sign: 1

      # SREBP 家族与 lipogenic 靶基因
      - name: Srebf1      # SREBP1c, fatty acid synthesis
        gene_effect_sign: 1
      - name: Fasn        # Fatty acid synthase
        gene_effect_sign: 1
      - name: Acaca       # Acetyl-CoA carboxylase α
        gene_effect_sign: 1
      - name: Scd1        # Stearoyl-CoA desaturase 1
        gene_effect_sign: 1
      - name: Dgat2       # Diacylglycerol acyltransferase 2
        gene_effect_sign: 1

      # 碳流入 lipid synthesis 的转录调控
      - name: Mlxipl      # ChREBP, carbohydrate-responsive TF
        gene_effect_sign: 1

  Supply_PPAR_alpha_FAO:
    axis: "Supply"
    label: "PPARα-driven fatty acid oxidation & lipid clearance"
    description: >
      PPARα 及其代表性靶基因，增强脂肪酸氧化和脂质清除，为线粒体提供
      β-氧化底物和乙酰辅酶 A，从而影响心磷脂合成底物供给。
    genes:
      - name: Ppara
        gene_effect_sign: 1
      - name: Ppargc1a
        gene_effect_sign: 1
      - name: Cpt1a
        gene_effect_sign: 1
      - name: Cpt2
        gene_effect_sign: 1
      - name: Acadl
        gene_effect_sign: 1
      - name: Acadm
        gene_effect_sign: 1
      - name: Acox1       # peroxisomal acyl-CoA oxidase
        gene_effect_sign: 1
      - name: Slc27a1
        gene_effect_sign: 1

  ## =========================================================
  ## TRANSPORT 轴：ER–线粒体交通 / MAM / 线粒体结构与进口
  ## =========================================================

  Transport_PGC1a_NRF1_mito_biogenesis_import:
    axis: "Transport"
    label: "PGC-1α / NRF1 mitochondrial biogenesis & import"
    description: >
      PGC-1α 及其 NRF1/2 靶基因，调控线粒体质量、蛋白导入和呼吸链装配。
      整体上决定线粒体膜面积与进口机器容量，从而影响磷脂运输与分配。
    genes:
      - name: Ppargc1a    # PGC-1α
        gene_effect_sign: 1
      - name: Nrf1        # Nuclear respiratory factor 1
        gene_effect_sign: 1
      - name: Nfe2l2      # NRF2 / Nrf2
        gene_effect_sign: 1

      # mtDNA 转录/复制
      - name: Tfam
        gene_effect_sign: 1
      - name: Tfb1m
        gene_effect_sign: 1
      - name: Tfb2m
        gene_effect_sign: 1
      - name: Polg
        gene_effect_sign: 1
      - name: Polg2
        gene_effect_sign: 1

      # 线粒体蛋白导入通道（外膜 / 内膜）
      - name: Tomm20      # outer membrane import receptor
        gene_effect_sign: 1
      - name: Tomm40
        gene_effect_sign: 1
      - name: Timm23      # inner membrane translocase
        gene_effect_sign: 1
      - name: Timm17a
        gene_effect_sign: 1

  Transport_MAM_contact_sites:
    axis: "Transport"
    label: "ER–mitochondria contact (MAM) tethers"
    description: >
      ER–线粒体接触位点（MAM）的锚定蛋白与调控因子，决定非囊泡方式
      磷脂在 ER 与线粒体之间的转运效率，也影响钙信号与应激反应。
    genes:
      - name: Mfn2        # Mitofusin 2, bridges ER-mito contacts
        gene_effect_sign: 1
      - name: Vapa        # ER membrane protein at MAM
        gene_effect_sign: 1
      - name: Rmdn3       # PTPIP51, MAM tether (ER protein)
        gene_effect_sign: 1
      - name: Vps13d      # VPS13 family, bulk lipid transfer
        gene_effect_sign: 1
      - name: Psen1       # Presenilin 1, reported at MAM
        gene_effect_sign: 1
      - name: Hspa9       # Hspa9, chaperone in IP3R–VDAC bridge
        gene_effect_sign: 1
      - name: Vdac1       # outer membrane channel, Ca2+ / metabolite flux
        gene_effect_sign: 1

  Transport_phospholipid_transfer_proteins:
    axis: "Transport"
    label: "Mitochondrial phospholipid transfer proteins"
    description: >
      参与 ER→线粒体/线粒体内膜之间磷脂转运的转运蛋白与辅助因子，
      包括 START 结构域蛋白和 PRELID/TRIAP1 相关复合体等。
    genes:
      # START domain phospholipid transfer proteins
      - name: Stard7      # delivers PC to mitochondria
        gene_effect_sign: 1
      - name: Stard5
        gene_effect_sign: 1
      - name: Stard3
        gene_effect_sign: 1

      # PRELID / TRIAP1-like complex（人类同源）
      - name: Prelid1     # Ups1 ortholog, PA/CL-related transport
        gene_effect_sign: 1
      - name: Prelid2     # Ups2 ortholog
        gene_effect_sign: 1
      - name: Triap1      # Mdm35 ortholog
        gene_effect_sign: 1

      # 其它与磷脂/心磷脂转运或内膜包装相关的候选
      - name: Pnpla8      # iPLA2γ, remodeling & CL-related dynamics
        gene_effect_sign: 1
      - name: Plscr3      # phospholipid scramblase 3
        gene_effect_sign: 1

  Transport_MICOS_cristae_morphology:
    axis: "Transport"
    label: "MICOS / cristae organization affecting CL distribution"
    description: >
      MICOS 复合体与相关内膜结构蛋白，重塑 cristae 架构和 CL 分布，
      影响内膜表面积与局部磷脂聚集，从而改变“运输终点”的容量。
    genes:
      - name: Immt        # MIC60
        gene_effect_sign: 1
      - name: Chchd3      # MIC19
        gene_effect_sign: 1
      - name: Chchd6      # MIC25
        gene_effect_sign: 1
      - name: Samm50      # SAM50, outer membrane component
        gene_effect_sign: 1
      - name: Dnm1l       # DRP1, fission, impacts cristae / contacts
        gene_effect_sign: 1
      - name: Opa1        # inner membrane fusion, cristae junctions
        gene_effect_sign: 1

  ## =========================================================
  ## SYNTHESIS 轴：CL 合成酶级联与其上游调控
  ## =========================================================

  Synthesis_core_CL_synthesis_enzymes:
    axis: "Synthesis"
    label: "Core cardiolipin synthesis enzymes (PA→PG→CL)"
    description: >
      核心心磷脂合成酶级联（TAMM41 / PGS1 / PTPMT1 / CRLS1），
      决定从 PA/PG 底物到成熟 CL 的“最后一公里”产能，是合成轴
      最直接的酶学瓶颈读出。
    genes:
      - name: Tamm41      # PA→CDP-DAG on IMM
        gene_effect_sign: 1
      - name: Pgs1        # CDP-DAG→PGP
        gene_effect_sign: 1
      - name: Ptpmt1      # PGP→PG
        gene_effect_sign: 1
      - name: Crls1       # PG→CL (cardiolipin synthase)
        gene_effect_sign: 1

  Synthesis_TF_control_of_CL_machinery:
    axis: "Synthesis"
    label: "Transcriptional control of CL synthesis machinery"
    description: >
      通过 PGC-1 / ERR / NRF 等转录调控程序，上调心磷脂合成相关酶
      与线粒体磷脂代谢基因的表达，间接增强 CL 合成能力。
    genes:
      - name: Ppargc1a    # PGC-1α, coactivator of mito lipid genes
        gene_effect_sign: 1
      - name: Esrra       # ERRα, partners with PGC-1α
        gene_effect_sign: 1
      - name: Gabpa       # GABPα / NRF2 (nuclear), mito gene TF
        gene_effect_sign: 1
      - name: Nrf1        # Nuclear respiratory factor 1
        gene_effect_sign: 1
      - name: Tfam        # mtDNA transcription/replication factor
        gene_effect_sign: 1

  ## =========================================================
  ## REMODELING 轴：CL 重塑与 acyl 链编辑
  ## =========================================================

  Remodeling_TAZ_LCLAT1_acyl_chain_remodeling:
    axis: "Remodeling"
    label: "TAZ / LCLAT1-mediated CL acyl-chain remodeling"
    description: >
      以 TAZ / LCLAT1 为核心的心磷脂分子种 acyl 链重塑系统，
      决定成熟 CL 的脂肪酸组成与功能质量，是重塑轴的直接执行模块。
    genes:
      - name: Taz         # Tafazzin, CL-specific transacylase
        gene_effect_sign: 1
      - name: Lclat1      # ALCAT1, CL acyltransferase
        gene_effect_sign: 1
      - name: Pla2g6      # iPLA2β, generates lyso-CL
        gene_effect_sign: 1
      - name: Pnpla8      # iPLA2γ, mito phospholipase
        gene_effect_sign: 1

  Remodeling_peroxisomal_FA_chain_editing:
    axis: "Remodeling"
    label: "Peroxisomal fatty-acid chain editing linked to CL"
    description: >
      过氧化物酶体 β-氧化与链长剪裁，通过调节 PUFA 供给间接影响
      CL 重塑所需脂肪酸池。
    genes:
      - name: Acox1       # peroxisomal acyl-CoA oxidase
        gene_effect_sign: 1
      - name: Hsd17b4     # D-bifunctional protein, VLCFA oxidation
        gene_effect_sign: 1
      - name: Ehhadh      # peroxisomal L-bifunctional enzyme
        gene_effect_sign: 1
      - name: Pex5        # peroxisomal import receptor
        gene_effect_sign: 1

  ## =========================================================
  ## OXIDATION 轴：驱动或限制 CL 氧化的 ROS 网络
  ## =========================================================

  Oxidation_mito_ROS_generators:
    axis: "Oxidation"
    label: "Mitochondrial ROS generators driving CL peroxidation"
    description: >
      线粒体电子传递链与相关 ROS 生成因子，增加局部氧自由基负荷，
      推动心磷脂过氧化与氧化轴活跃度升高。
    genes:
      - name: Ndufs1      # Complex I core subunit
        gene_effect_sign: 1
      - name: Ndufs2
        gene_effect_sign: 1
      - name: Uqcrc1      # Complex III core protein
        gene_effect_sign: 1
      - name: Cycs        # Cytochrome c, CL peroxidase cofactor
        gene_effect_sign: 1
      - name: Nox4        # NADPH oxidase 4, mitochondrial ROS
        gene_effect_sign: 1

  Oxidation_antioxidant_defenses:
    axis: "Oxidation"
    label: "Mitochondrial antioxidant defenses limiting CL oxidation"
    description: >
      线粒体 / 细胞抗氧化系统（SOD2 / PRDX3 / GPX / CAT 等），
      通过清除 ROS 抵消 CL 氧化压力，在氧化轴中多作为“保护性”反向 readout。
    genes:
      - name: Sod2        # Mn-SOD in matrix
        gene_effect_sign: 1
      - name: Prdx3       # mitochondrial peroxiredoxin
        gene_effect_sign: 1
      - name: Gpx1        # glutathione peroxidase
        gene_effect_sign: 1
      - name: Gpx4        # lipid hydroperoxide GPX
        gene_effect_sign: 1
      - name: Cat         # catalase
        gene_effect_sign: 1
      - name: Nfe2l2      # Nrf2, master antioxidant TF
        gene_effect_sign: 1

  ## =========================================================
  ## MEMBRANE CONTEXT 轴：线粒体膜面积与 OXPHOS 结构
  ## =========================================================

  Membrane_context_mito_mass_surface_area:
    axis: "Membrane context"
    label: "Mitochondrial mass & membrane surface area"
    description: >
      线粒体生物发生与内膜/外膜面积扩张相关的调控因子，影响
      每个细胞可供 CL 和其它磷脂“铺展”的总膜面积，是膜环境轴的几何基础。
    genes:
      - name: Ppargc1a    # PGC-1α, drives mito biogenesis
        gene_effect_sign: 1
      - name: Nrf1
        gene_effect_sign: 1
      - name: Gabpa
        gene_effect_sign: 1
      - name: Tfam
        gene_effect_sign: 1
      - name: Tfb2m
        gene_effect_sign: 1

  Membrane_context_OXPHOS_supercomplex_organization:
    axis: "Membrane context"
    label: "Respiratory-chain / OXPHOS supercomplex organization"
    description: >
      呼吸链复合体与 ATP 合酶的装配因子，影响 CL 富集的蛋白–脂质超复合体
      稳定性，从而改变 CL 在内膜中的“使用场景”。
    genes:
      - name: Ndufs1
        gene_effect_sign: 1
      - name: Uqcrc1
        gene_effect_sign: 1
      - name: Cox4i1      # Complex IV subunit
        gene_effect_sign: 1
      - name: Atp5f1a     # ATP synthase F1 α subunit
        gene_effect_sign: 1
      - name: Atp5mc1     # ATP synthase membrane subunit c
        gene_effect_sign: 1
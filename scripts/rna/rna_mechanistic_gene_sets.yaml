# ============================================================
# Transcriptomic mechanistic gene sets for cardiolipin homeostasis
# 可扩容：后续若发现新的机制基因，可在对应 axis / module 下追加 genes
# ============================================================

metadata:
  version: "0.2"
  species: "Mus_musculus"   # 视你转录组物种修改：如 "Mus_musculus" / "Homo_sapiens"
  description: >
    Mechanistic gene sets for cardiolipin synthesis, remodeling,
    oxidation/degradation, transport/distribution and precursor supply / 
    mitochondrial capacity. Each axis is split into core, extended and
    regulatory / modulatory modules when applicable.


# ============================================================
# ID 映射配置：让脚本知道如何从 gene symbol 映射到 Ensembl ID
# ============================================================

mapping:
  # DE 结果文件中基因 ID 所在的列名（来自 08_deseq2/09_deg_filter 之后的表）
  de_gene_id_column: "GeneID"

  # DE 结果里的 ID 类型：这里明确是 Ensembl
  de_id_type: "ensembl_gene_id"

  # 外部映射文件，用于从 gene_symbol 映射到 Ensembl ID
  # 你需要自己准备这张表，至少包含：
  #   - name: ensembl_gene_id
  #   - name: gene_symbol
  # 建议放在 multiomics_mech/ref/gene_symbol_to_ensembl.tsv
  table: "scripts/rna/rna_mechanistic_gene_sets_gene_registry.tsv"

  # 映射表中对应的列名
  symbol_column: "gene_symbol"
  ensembl_column: "ensembl_gene_id"

# 每个 axis 下可以有若干 module（core / extended / regulatory），
# 后续你若想增加子路径（例如“CDP-DAG branch”），可以新增 module。

axes:
  Synthesis:
    description: >
      PA → CDP-DAG → PGP → PG → CL 的心磷脂生物合成链，
      以及决定前体 PA / CDP-DAG 供应和整体线粒体磷脂合成能力的相关通路。
    modules:

      gene_set:
        label: "Transcriptomic gene set for Synthesis axis"
        description: >
          从 figure_6_b.xlsx 中 feature_type = "gene" 且 axis = "Synthesis" 的行自动生成。
        genes:
          - name: Tamm41
            gene_effect_sign: -1
            weight: 1.0
          - name: Pgs1
            gene_effect_sign: -1
            weight: 1.0
          - name: Ptpmt1
            gene_effect_sign: -1
            weight: 1.0
          - name: Crls1
            gene_effect_sign: -1
            weight: 1.0
          - name: Ddit3
            gene_effect_sign: 1
            weight: 0.5
          - name: Sirt3
            gene_effect_sign: -1
            weight: 0.3

  Remodeling:
    description: >
      CL ↔ MLCL 之间的脱酰 / 再酰化循环（Lands' remodeling），
      决定 CL 的 acyl 组成和功能完整性。
    modules:

      gene_set:
        label: "Transcriptomic gene set for Remodeling axis"
        description: >
          从 figure_6_b.xlsx 中 feature_type = "gene" 且 axis = "Remodeling" 的行自动生成。
        genes:
          - name: Tafazzin
            gene_effect_sign: -1
            weight: 1.0
          - name: Lclat1
            gene_effect_sign: -1
            weight: 1.0
          - name: Pla2g6
            gene_effect_sign: 1
            weight: 0.5
          - name: Pnpla8
            gene_effect_sign: 1
            weight: 0.3

  Oxidation:
    description: >
      通过脂氧合酶、ROS 生成和抗氧化系统决定 CL 被氧化、
      分解或保护的平衡。
    modules:

      gene_set:
        label: "Transcriptomic gene set for Oxidation axis"
        description: >
          从 figure_6_b.xlsx 中 feature_type = "gene" 且 axis = "Oxidation" 的行自动生成。
        genes:
          - name: Alox15
            gene_effect_sign: 1
            weight: 1.0
          - name: Cybb
            gene_effect_sign: 1
            weight: 0.7
          - name: Cyp2e1
            gene_effect_sign: 1
            weight: 0.5
          - name: Pla2g6
            gene_effect_sign: 1
            weight: 0.5

  Transport:
    description: >
      通过膜翻转酶、scramblase、接触点复合体和脂质转运蛋白
      调控 CL 在 IMM/OMM 及 ER–mitochondria 之间的分布。
    modules:

      gene_set:
        label: "Transcriptomic gene set for Transport axis"
        description: >
          从 figure_6_b.xlsx 中 feature_type = "gene" 且 axis = "Transport" 的行自动生成。
        genes:
          - name: Prelid1
            gene_effect_sign: -1
            weight: 1.0
          - name: Triap1
            gene_effect_sign: -1
            weight: 1.0
          - name: Stard7
            gene_effect_sign: -1
            weight: 0.7

  Supply:
    description: >
      从碳源 → FA → 前体磷脂的供应链，以及线粒体生成与 OXPHOS 能力，
      共同决定可容纳 CL 的膜面积与底物供应。
    modules:

      gene_set:
        label: "Transcriptomic gene set for Supply axis"
        description: >
          从 figure_6_b.xlsx 中 feature_type = "gene" 且 axis = "Supply" 的行自动生成。
        genes:
          - name: Acly
            gene_effect_sign: -1
            weight: 1.0
          - name: Acaca
            gene_effect_sign: -1
            weight: 1.0
          - name: Fasn
            gene_effect_sign: -1
            weight: 1.0
          - name: Gpam
            gene_effect_sign: -1
            weight: 1.0
          - name: Agpat1
            gene_effect_sign: -1
            weight: 1.0
          - name: Acacb
            gene_effect_sign: -1
            weight: 0.5
          - name: Agpat2
            gene_effect_sign: -1
            weight: 0.5
          - name: Gpat2
            gene_effect_sign: -1
            weight: 0.5
          - name: Gpat3
            gene_effect_sign: -1
            weight: 0.3
          - name: Gpat4
            gene_effect_sign: -1
            weight: 0.3
          - name: Tfam
            gene_effect_sign: -1
            weight: 0.5
          - name: Polg
            gene_effect_sign: -1
            weight: 0.3
          - name: Tomm20
            gene_effect_sign: -1
            weight: 0.5

  Membrane context:
    description: >
      膜磷脂库缩水（PC/PE/PI/PS/PG/CL 共同下降）+ TG 上升，常由“合成/供给通量受限”
      驱动：包括 de novo 脂肪酸与甘油骨架供给、ER 侧磷脂合成节点，以及线粒体侧 CDP-DAG→PG/CL
      分支的前体通量。该轴用于检验“合成/供给不足是否为主要障碍来源”。
    modules:

      gene_set:
        label: "Transcriptomic gene set for Flux limitation axis"
        description: >
          手工构建：覆盖脂肪酸与甘油骨架供给、Kennedy pathway（PC/PE）、CDP-DAG branch（PI/PG/CL）
          以及 PS 合成/交换等关键瓶颈节点。分数高=障碍重，因此能力基因取 -1。
        genes:
          # de novo FA synthesis / acetyl-CoA → malonyl-CoA → FA
          - name: Acly
            gene_effect_sign: -1
            weight: 1.0
          - name: Acaca
            gene_effect_sign: -1
            weight: 1.0
          - name: Fasn
            gene_effect_sign: -1
            weight: 1.0

          # glycerol backbone & PA/DAG formation
          - name: Gpam
            gene_effect_sign: -1
            weight: 1.0
          - name: Agpat2
            gene_effect_sign: -1
            weight: 0.7
          - name: Lpin1
            gene_effect_sign: -1
            weight: 0.7

          # Kennedy pathway (PC/PE)
          - name: Chka
            gene_effect_sign: -1
            weight: 0.7
          - name: Pcyt1a
            gene_effect_sign: -1
            weight: 1.0
          - name: Cept1
            gene_effect_sign: -1
            weight: 0.7
          - name: Etnk1
            gene_effect_sign: -1
            weight: 0.5
          - name: Pcyt2
            gene_effect_sign: -1
            weight: 0.7

          # CDP-DAG branch (PI/PG/CL)
          - name: Cds1
            gene_effect_sign: -1
            weight: 0.7
          - name: Cdipt
            gene_effect_sign: -1
            weight: 0.7
          - name: Pgs1
            gene_effect_sign: -1
            weight: 0.7
          - name: Crls1
            gene_effect_sign: -1
            weight: 0.7

          # PS synthesis/flip (supports PS pool maintenance)
          - name: Ptdss1
            gene_effect_sign: -1
            weight: 0.5
          - name: Ptdss2
            gene_effect_sign: -1
            weight: 0.5
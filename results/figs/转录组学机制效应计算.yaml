# ========== Metadata ==========
figure: ""                   # 例如 "Figure 6"
panel: ""                    # 例如 "A"
title: "Transcriptomic mechanistic axis scores (RNA-seq gene-set analysis)" 
research_theme: "Mechanistic bottlenecks of cardiolipin metabolism (RNA-seq layer)"

# ========== Assets ==========
figure_file: 
  - "results/rna/plots/mechanistic_axis_heatmap.png"
  - "results/rna/plots/mechanistic_axis_bar_or_radar.png"

data_sources:
  - "results/rna/<batch_or_merged>/deseq2_results.tsv   # from 08_deseq2.R, per dataset/batch"
  - "configs/rna_mechanistic_gene_sets.yaml             # axis → gene set definitions"
  - "configs/rna_mechanistic_axis_schema.yaml           # 本 schema 文件"

supplementary_links:
  - "results/rna/<batch_or_merged>/top_DE_genes.tsv"
  - "results/rna/<batch_or_merged>/PCA_vst.png"
  - "results/rna/<batch_or_merged>/sample_correlation.png"

# ========== 1. Research Question ==========
research_question: >
  Ephb1 敲除在转录组层面上，是否以及如何沿着“合成 / 重塑 / 氧化 / 转运 / 供给”等
  心磷脂相关机制轴整体性地重排基因表达？这些机制轴的转录组效应方向和强度是多少？

# ========== 2. Hypothesis ==========
hypothesis: >
  若 Ephb1 敲除导致心磷脂含量与氧化状态发生改变，则其对应机制轴（如合成轴、重塑轴、
  氧化轴、转运轴和供给轴）内的关键基因集在转录组层面会出现成组的表达漂移，
  可以体现在轴级别的 Z 分数（KO vs WT）上。

# ========== 3. Experimental Design ==========
groups:
  - name: "WT"
    n: 0                      # 实际生物学重复数由真实 RNA-seq 批次补充
    description: "Wild-type mouse peritoneal macrophages (RNA-seq, baseline or stimulated as in experiment)"
  - name: "KO"
    n: 0
    description: "Ephb1 knockout mouse peritoneal macrophages (RNA-seq, same condition as WT)"

variables:
  independent: "Genotype (WT vs Ephb1 KO)"
  dependent: >
    Gene-level expression changes (log2 fold change KO vs WT) and
    transcriptomic mechanistic axis scores (per-axis Z scores derived from gene sets)
  controlled:
    - "刺激条件与时间（如与脂质组学配套的 LPS + Nigericin 或其它处理保持一致）"
    - "样本类型（peritoneal macrophages）"
    - "测序平台、文库构建策略与比对流程"

conditions:
  stimuli: >
    Same stimulation paradigm as corresponding lipidomics experiment
    (e.g., LPS (1 μg/ml) + Nigericin (10 μM) if applicable; adjust to actual design).
  time_points: "Single time point per dataset, matched between WT and KO within each batch"
  dose: "Genotype contrast only; no dose gradient (KO vs WT)"
  environment: "Standard culture and RNA extraction conditions; temperature/CO₂ consistent across groups"

assay:
  name: "Bulk RNA-seq (DESeq2-based differential expression)"
  readouts:
    - "Gene-level raw counts (from featureCounts or similar)"
    - "DESeq2-normalized expression (vst / normalized counts)"
    - "Per-gene log2 fold change (KO vs WT) with p-value / padj"
    - "Mechanistic axis Z-scores (per axis × per batch, aggregated from gene sets)"

analysis:
  preprocessing: >
    Use merged count matrix (from 07_merge_counts.R) as input; filter lowly expressed genes
    (rowSums(counts) ≥ 10); construct colData with batch and condition from sample names.
  normalization: >
    DESeq2 size-factor normalization and variance-stabilizing transformation (vst)
    to obtain comparable expression values across samples and batches.
  statistics: >
    1) Run 08_deseq2.R with design ~ batch + condition to estimate KO vs WT effects
       and obtain per-gene log2FC, p-value, padj;
    2) For each mechanistic gene set (axis-specific), compute aggregated transcriptomic
       effect per axis per batch (e.g., mean or weighted mean log2FC converted to Z-score);
    3) Optionally, use gene-set testing (camera/fgsea/GSEA-style) to obtain axis-level
       enrichment statistics as Z 或 NES，并整理为“axis × batch”的矩阵。
  visualization: >
    Heatmap of mechanistic axis Z-scores across batches (axis × batch),
    bar/point plots or radar-style plots summarizing the relative magnitude of each axis
    per batch (KO vs WT), aligned with lipidomic axis scores for comparison.

# ========== 4. Experimental Key Steps ==========
key_steps:
  - "从 07_merge_counts.R 输出的 gene × sample 计数矩阵中读取原始 counts，并过滤总计数极低的基因。"
  - "根据样本列名自动解析 batch 与 condition（WT/KO），构建 colData（08_deseq2.R）。"
  - "在设计式中显式建模批次：dds ~ batch + condition，运行 DESeq2（Wald test）。"
  - "输出每个数据集/批次的 deseq2_results.tsv（包含 log2FC, pvalue, padj），作为机制分析的基因层源文件。"
  - "读取 rna_mechanistic_gene_sets.yaml，将每个机制轴映射到具体 GeneID 列表。"
  - "建立rna_axis_sign.yaml,将每个机制轴的变化方向统一化"
  - "按 gene set 提取对应基因的 log2FC / 统计量，计算每个 axis 在每个批次中的综合效应（如平均 log2FC → Z 分数）。"
  - "整理得到“axis × batch”的转录组学机制效应矩阵，并与脂质组学 axis 分数做结构对应。"
  - "生成轴级别 Z 分数的热图、条形图或雷达图，以可视化 KO 相对 WT 的转录组机制重排模式。"

# ========== 5. Results（AI 用它写论文 Results 段） ==========
results:
  primary_findings: >
    本 panel 将总结 Ephb1 KO 在转录组层面沿五大机制轴（合成、重塑、氧化、转运、供给）的
    整体表达漂移：对每一条轴，KO vs WT 的基因集整体是上调（正 Z）还是下调（负 Z），
    并比较不同批次间模式是否一致。
  quantitative_summary: >
    定量上，以“机制轴 × 批次”矩阵的形式给出 Z 分数或标准化效应值，
    并可以标注 |Z| 超过预设阈值（如 |Z| ≥ 2）或对应 FDR 较低的轴为“显著改变的机制瓶颈”。
  alignment_with_hypothesis: >
    若某些机制轴在脂质组学上表现出明显的瓶颈（例如合成轴 CL/PG↓、重塑轴 MLCL/CL↑），
    且在转录组学上其对应基因集也呈现一致方向的显著变化，
    则支持“Ephb1 敲除通过这些特定机制轴扰动心磷脂稳态”的假设；
    若轴级别 Z 分数接近 0，则提示该轴在转录层面相对稳定，可能主要由后转录或代谢层面调控。

# ========== 6. Interpretation（论文式推论） ==========
interpretation:
  biological_significance: >
    通过将基因层 DE 结果压缩到机制轴层面的 Z 分数，
    我们能够从转录层清晰看出 Ephb1 KO 更偏向于激活哪些环节
    （如 ROS/oxCL 相关氧化轴、重塑轴、PC/PE 供给轴），
    以及哪些环节在基因表达层面相对沉默或补偿，
    进而为“心磷脂含量下降/氧化升高”的脂质组学表型提供机制解释。
  connection_to_storyline: >
    该 panel 是“多组学机制瓶颈”链条中的 RNA-seq 一环。
    它与脂质组学机制效应计算形成一一对应的轴级 readout，
    用于在结果部分对比“脂质侧 vs 转录侧”的一致性和解耦：
    哪些瓶颈轴在两层均有信号，哪些仅在脂质层体现。
  implications: >
    若发现某些轴在转录与脂质两侧均显示显著瓶颈（例如重塑轴、氧化轴），
    则可将其作为后续功能验证和干预靶点；
    若某些轴仅在脂质层异常但转录层无明显漂移，
    则提示存在更偏向于酶活性或亚细胞分布层面的调控，
    为后续蛋白组/磷酸化组分析提供方向。

# ========== 7. Limitations / Alternative Explanations ==========
limitations:
  - "机制基因集目前为人工 curated，可能不完全覆盖所有参与心磷脂代谢与转运的基因；需要后续文献更新与可扩容。"
  - "DESeq2 基于 ~ batch + condition 的线性模型假设批次效应为加性；若存在强烈 batch×condition 交互，则轴级别 Z 分数需要按批次分别解读。"
  - "轴级 Z 分数依赖基因集成员数与权重选择（平均 vs 加权），不同策略可能影响绝对数值大小。"
  - "当前 schema 未显式纳入细胞构成变化（若有 bulk RNA 中的细胞比例差异），可能混淆部分机制轴的转录信号。"
alternative_explanations:
  - "观察到的轴级表达重排，部分可能来自于普遍应激或炎症反应（如 ROS 与 NLRP3 激活），而非 Ephb1 专一效应。"
  - "若样本量有限，部分轴级 Z 分数可能因单个高变基因驱动，未必代表整个通路的稳定改变。"
  - "转录层面机制轴上调不一定直接对应酶活性或脂质流量增加，可能受到翻译后修饰与代谢物反馈调控。"

# ========== 8. Next Step ==========
next_step:
  question_to_test: >
    哪些在转录组与脂质组两侧均显示显著瓶颈信号的机制轴，
    是决定性驱动 Ephb1 KO 心磷脂表型的关键环节？
  proposed_experiments:
    - "将本 panel 的 RNA 轴级 Z 分数与脂质轴级分数做系统相关分析，识别“转录–脂质一致”的高置信瓶颈轴。"
    - "在候选轴上选取核心基因（如 CRLS1、TAZ、LYCAT、ALOX15、STARD7、PGC-1α）进行 qPCR/Western 验证。"
    - "在体外通过 siRNA/CRISPR 或过表达方式，分别操控这些轴上的关键基因，观察是否能部分纠正 Ephb1 KO 的心磷脂与线粒体功能表型。"
    - "根据轴级结果设计后续蛋白组/磷酸化组实验，以验证转录信号是否传递至酶水平与代谢流量。"
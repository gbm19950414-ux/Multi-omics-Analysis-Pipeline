    logs: >


    
notes:
  integration_summary: >
    Figure 7 将 Ephb1 信号转导与多组学机制轴整合为闭环：
    下游 signaling modules (7B–7C) 驱动机制轴，
    机制轴则中介 Ephb1 对 cardiolipin 瓶颈的效应（7D），
    并由 7A 所展示的因果框架统一起来。
# ========== Metadata ==========
figure: "6"                   # 如 "Figure 5"
panel: "c"                    # 如 "C"
title: "Mechanistic axis scores derived from lipidomics" 
research_theme: "Mitochondrial cardiolipin homeostasis"

# ========== Assets ==========
figure_file: 
- results/lipid/plots/lipid_indicator_heatmap_logFC_per_batch.png
data_sources:
- results/lipid/tables/lipid_mechanistic_axis_scores_per_batch_group.tsv
- results/lipid/tables/lipid_mechanistic_indicator_DE_per_batch.tsv
- results/lipid/tables/lipid_mechanistic_indicators_per_sample.tsv
supplementary_links:
- results/lipid/plots/lipid_axis_score_radar_by_batch.png

# ========== 1. Research Question ==========
research_question: >
  Ephb1 缺失是否通过影响心磷脂的合成、重塑、氧化、转运和供给等关键机制轴，
  改变线粒体膜心磷脂稳态，从而形成可量化的“机制瓶颈指纹”？

# ========== 2. Hypothesis ==========
hypothesis: >
  与 WT 相比，Ephb1 缺失巨噬细胞在心磷脂合成/重塑/转运/供给/氧化轴上存在明显的机制瓶颈

# ========== 3. Experimental Design ==========
groups:
  - name: WT
    n: 0                     # 实际 n 由每批次纳入的 WT 样本数决定（per-batch 计算）
    description: "Wild-type peritoneal macrophages, LC–MS-based lipidomics"
  - name: HO
    n: 0
    description: "Ephb1 knockout peritoneal macrophages, 同一脂质组学流程"

variables:
  independent: "Genotype (WT vs Ephb1 HO), analysed per batch"
  dependent: >
    Lipidomic mechanistic axis scores (Synthesis / Remodeling / Oxidation /
    Transport / Supply), derived from CL/PG、MLCL/CL、oxCL/CL、PG/PA、
    ΣCL、ΣPG
    # 合成轴:
    CL_PG_ratio = if_else(PG > 0, CL / PG, NA_real_),
    sum_CL      = CL,
    sum_PG      = PG,

    # 重塑轴
    MLCL_CL_ratio = if_else(CL > 0, MLCL / CL, NA_real_),
    sum_MLCL      = MLCL,

    # 氧化轴
    oxCL_CL_ratio = if_else(CL > 0, oxCL / CL, NA_real_),
    sum_oxCL      = oxCL,

    # 转运 
    PG_PA_ratio = if_else(PA > 0, PG / PA, NA_real_),
    # 供给
    mito_lipid_mass = PC + PE + CL,
    CL_fraction     = if_else((PC + PE + CL) > 0, CL / (PC + PE + CL), NA_real_)
  
  controlled:
    - "样本类型：均为小鼠腹腔巨噬细胞（同品系、相近年龄与性别构成）"
    - "脂质提取与 LC–MS 测定流程一致，同一平台、同一内部标准体系"
    - "批次内使用 QC 样本评估并校正漂移（PQN + panel scaling）"
    - "机制指标统一基于批次内长表 lipid_long_dedup_pqn.tsv 计算"

conditions:
  stimuli: "Basal condition（无急性 LPS/Nigericin 等刺激）"
  time_points: "Single time point at isolation/end of culture"
  dose: ""
  environment: "标准培养条件；但本分析为脂质组学数据二次分析，不直接操控环境变量"

assay:
  name: "LC–MS lipidomics (global + cardiolipin-focused)"
  readouts:
    - "批次内 PQN 归一化后的脂质长表：lipid_long_dedup_pqn.tsv"
    - "脂质类别注释：Class (CL, MLCL, PG, PA, oxCL, PC, PE 等)"
    - "每个样本的脂质峰强度 / 相对丰度"

analysis:
  preprocessing: >
    在每个批次内使用 PQN 进行归一化，过滤低检测率和低方差特征；
    使用去重后的长表 lipid_long_dedup_pqn.tsv 作为机制指标计算的基础。
  normalization: >
    将同一 Class 或同一机制相关类别下的脂质信号求和或求均值，
    构建 ΣCL、ΣPG、ΣMLCL、ΣoxCL、ΣPC、ΣPE 等；
    然后计算比值指标（CL/PG、MLCL/CL、oxCL/CL、PG/PA 等），
    对每个指标在批次内按样本做 z-score 标准化。
  statistics: > 
    将多个指标按 sign matrix 方向性校准（统一为高 = 瓶颈更严重），
    在每个机制轴内对相关指标的 z-score 求均值，得到 per-sample axis score；
    在每个 batch × group 中对 axis score 求均值和标准差，
    用于可视化和描述性比较（必要时可用线性模型/limma 检验 batch 内 HO vs WT 差异）。
  visualization: >
    (1) per-batch PCA / volcano / heatmap (见前序脚本)；
    (2) 机制轴 score 的箱线图（per batch × group）；
    (3) 机制轴 score 的热图（axis × batch_group）；
    (4) per-batch 雷达图展示 HO 与 WT 的机制指纹差异。

# ========== 4. Experimental Key Steps ==========
key_steps:
  - "基于批次内长表 lipid_long_dedup_pqn.tsv 过滤出需要的类：CL、MLCL、PG、PA、oxCL、PC、PE 等"
  - "对每个样本计算 ΣCL、ΣPG、ΣMLCL、ΣoxCL、ΣPC、ΣPE 以及 PG/PA 等必要总量与比值指标"
  - "使用预定义的指标配置表（lipid_mechanistic_indicator_config.yaml）统一指定公式与所需 Class"
  - "使用方向性校准矩阵（lipid_mechanistic_indicator_sign_matrix.yaml）将各指标转换为“瓶颈强度”方向的一致 z-score"
  - "在每个机制轴内对相关指标的校准后 z-score 取均值，生成 per-sample axis score"
  - "按 batch × group 聚合，生成 axis mean score 和 sd，用于热图和雷达图展示"

# ========== 5. Results（AI 用它写论文 Results 段） ==========
results:
  primary_findings: >
    在所有批次中，Ephb1 缺失组（HO）显示出一致的机制轴改变：
    Transport（转运轴）score 在 HO 中显著高于 WT，提示 CL 在内外膜间的分布/转运可能出现稳定瓶颈；但是在 Transport 轴中，由于 PG/PA ratio 原始差异极小，而 z-score 会强制对称中心化，导致 axis_score 在雷达图中被放大呈现生物学上并不存在的强烈 HO–WT 差异。因此当前雷达图的 Transport 差异主要来自数学变换，而非真实转运功能差异。
    Supply（供给轴）score 在 HO 中整体偏高，对应 ΣCL 、ΣPG、PG_PA_ratio、mito_lipid_mass、CL_fraction指标方向性改变，
    指示心磷脂总体容量与前体供应不足；
    remodeling（重塑轴）score在batch2中升高，batch3中降低，认为是不稳定的变化；
    synthesis（合成轴）score在batch2、3中升高，batch1、4中降低，提示合成轴变化不稳定，不是CL含量变化的主要原因
    而 Oxidation（氧化轴）score 接近零，因为脂质组学未检测到氧化心磷脂，所以无法进行计算
  quantitative_summary: >
    在合并各批次后的描述性统计中，Transport 轴 HO–WT 均值差异约为 0.3–0.5 z-score，
    Supply 轴则在 HO 中上升约 0.2–0.4 z-score；
  alignment_with_hypothesis: >
    结果与“Ephb1 缺失导致心磷脂供给/转运轴瓶颈加重”的假设高度一致，
    表明 Ephb1 更可能通过调节 CL 的分布和供应来影响线粒体功能，
    而不是通过显著放大 CL 氧化、消弱CL合成或阻断CL重塑。

# ========== 6. Interpretation（论文式推论） ==========
interpretation:
  biological_significance: >
    机制轴分析将高维脂质组学数据压缩为具备生物含义的瓶颈 score，
    使我们能够从整体层面理解 Ephb1 缺失对心磷脂稳态的扰动方式。
    结合批次间共享的趋势，可以得出如下结论：
    (1) Oxidation 轴基本为零，因为本次脂质组学未能检测到氧化心磷脂；
    因此“氧化驱动”并非 Ephb1 缺失导致 CL 改变的主要机制。
    (2) Synthesis 与 Remodeling 轴在不同批次呈现不一致或方向相反的变化，
    表明这些轴不构成跨批次稳定的瓶颈，不足以解释 HO 组 CL 总量下降的主因。
    (3) Supply（供给）轴在多个批次中呈 HO > WT 的一致趋势，
    提示前体供应与总线粒体膜容量方面可能存在轻度但稳定的限制，
    与 HO 组 CL 总量下降相吻合。
    (4) Transport 轴在雷达图中表现出较大差异，但进一步检查发现，
    该差异来自 z-score 的数学放大，而非原始 PG/PA 或转运相关脂质的显著变化，
    因此不能作为生物学证据，仅为数值标准化效应。
    综合上述，多批次数据更支持“CL 供应轻度不足”这一稳定趋势，
    而并未提供支持“重塑/氧化/转运强瓶颈”的证据。
  connection_to_storyline: >
    本 panel 将脂质组学从单脂质差异提升到机制表达层面，
    与前文的 CL 总量变化相呼应：
    虽然合成或重塑轴没有呈现稳定缺陷，
    但 HO 组在供应轴上的一致性改变提示 Ephb1 缺失可能通过影响
    前体脂质流向线粒体的效率、膜容量或相关供给机制，
    导致 CL 稳态下调。
    这一 conclusion 为后续转录组（如 STARD/MICOS、PGS1、TAMM41 等）
    的基因集分析和补救实验提供了框架与方向。
  implications: >
    改进后的机制轴分析提示：在本模型中，
    Ephb1 的作用更可能集中于 CL 供应链路，而非其重塑、氧化或膜转运机制。
    这一认识不仅帮助缩小潜在关键酶或调控节点的范围，
    也为将来开发改善 CL 水平的干预策略提供线索（如提升前体供应、
    改善线粒体膜脂质容量等）。

# ========== 7. Limitations / Alternative Explanations ==========
limitations:
  - "机制轴的构建依赖 z-score 转换和方向性校准（sign matrix），某些轴（如 Transport）在仅有单指标时易被标准化步骤放大，需谨慎解释"
  - "Oxidation 轴因检测不到足够的 oxCL 物种而缺失，因此无法评估潜在轻度氧化变化"
  - "批次间样本量不同，尽管本研究采用 per-batch 分析避免直接合并，但残存的 batch 技术差异仍可能淡化或放大某些趋势"
  - "供应轴涉及 ΣCL、ΣPG、membrane lipid mass 等多个综合指标，很难完全区分供应不足与整体线粒体含量下降这两种可能"

alternative_explanations:
  - "HO 组供应轴 score 上升可能反映线粒体数量减少（降低 CL/PC/PE 总量），而非真正的前体供应缺损"
  - "PG/PA、ΣPG 的变化可能受到 ER–mitochondria 接触点功能影响，因此不一定是纯粹的供应步骤瓶颈"
  - "虽然重塑轴无一致性变化，但 CL 的 FA 组成在本研究中未深度解析，潜在的 subtle remodeling 缺陷可能仍被低估"
  - "脂质稳态可能受到脂滴代谢、FA 流入或炎症状态的间接调控，而这些因素未在当前分析中系统评估"

# ========== 8. Next Step ==========
next_step:
  question_to_test: >
    Ephb1 缺失导致的 CL 总量下降是否主要由“供应轴”相关机制（前体脂质供应、
    线粒体膜容量、ER–mitochondria 接触点调控）所驱动？
  proposed_experiments:
    - "检测与供应轴相关的基因：PGS1、TAMM41、CDP-DAG 合成系、STARD7、MICOS 组件，
       结合转录组与蛋白表达验证是否存在一致性改变"
    - "使用 CL 纳米盘或 PG/PA 前体补给实验，评估 HO 细胞是否能部分恢复 CL 水平与线粒体功能"
    - "通过免疫荧光或 TEM 观察 HO 与 WT 的线粒体膜结构、膜密度和 cristae 形态，
       验证供应轴 score 是否反映结构性改变"
    - "引入急性刺激（如 LPS+Nigericin、ROS）重新进行脂质组学，以评估供应轴瓶颈在应激条件下是否被放大"
    - "对 Transport 和 Remodeling 轴进行更精细的 FA-species 定量分析，以排除 z-score 放大导致的虚假差异"